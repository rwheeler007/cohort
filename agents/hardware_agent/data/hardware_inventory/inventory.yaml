# Hardware Inventory
# =================
# Fill in your actual equipment. The hardware agent uses this to give
# context-aware recommendations, upgrade advice, and troubleshooting.
#
# Delete the example entries and replace with your own hardware.

builds:
  - name: "My Workstation"
    role: "Primary development machine"
    status: active
    cpu:
      model: ""           # e.g. "AMD Ryzen 7 5800X"
      socket: ""          # e.g. "AM4"
      cores: 0
      threads: 0
      base_clock_ghz: 0
      boost_clock_ghz: 0
      tdp_watts: 0
    gpu:
      - model: ""         # e.g. "NVIDIA RTX 3080 10GB"
        vram_gb: 0
        tdp_watts: 0
        pcie_slot: ""     # e.g. "x16 slot 1"
    motherboard:
      model: ""           # e.g. "ASUS ROG Strix B550-F"
      chipset: ""         # e.g. "B550"
      form_factor: ""     # ATX, mATX, ITX
      ram_slots: 0
      max_ram_gb: 0
      pcie_slots: []      # e.g. ["x16", "x4", "x1"]
    ram:
      total_gb: 0
      type: ""            # DDR4, DDR5
      speed_mhz: 0
      modules: ""         # e.g. "4x32GB"
      ecc: false
    storage:
      - device: ""        # e.g. "Samsung 980 Pro 1TB"
        type: ""          # NVMe, SATA SSD, HDD
        capacity_gb: 0
        interface: ""     # e.g. "M.2 PCIe Gen4"
        role: ""          # boot, data, scratch
    psu:
      model: ""           # e.g. "Corsair RM850x"
      wattage: 0
      efficiency: ""      # e.g. "80+ Gold"
      modular: true
    cooling:
      cpu_cooler: ""      # e.g. "Noctua NH-D15"
      case_fans: []       # e.g. ["3x 140mm front", "1x 140mm rear"]
    case:
      model: ""           # e.g. "Fractal Design Meshify C"
      form_factor: ""     # Full Tower, Mid Tower, SFF

networking:
  router:
    model: ""
    features: []          # e.g. ["Wi-Fi 6E", "2.5GbE WAN"]
  switches:
    - model: ""
      ports: 0
      speed: ""           # e.g. "1GbE", "2.5GbE", "10GbE"
      managed: false
  access_points:
    - model: ""
      standard: ""        # e.g. "Wi-Fi 6E"

peripherals:
  monitors:
    - model: ""
      size_inches: 0
      resolution: ""      # e.g. "3440x1440"
      panel: ""           # IPS, VA, OLED
      refresh_hz: 0
  input:
    keyboard: ""
    mouse: ""
  audio:
    speakers: ""
    headphones: ""
    microphone: ""

ups:
  - model: ""
    va_rating: 0
    watt_rating: 0
    protected_devices: [] # e.g. ["Workstation", "Monitor", "Switch"]

spares:
  # Components on hand for upgrades or replacements
  - item: ""
    quantity: 0
    notes: ""

planned_upgrades:
  # Upgrades you're considering -- the hardware agent can advise on these
  - description: ""
    priority: ""          # high, medium, low
    budget: ""            # e.g. "$500"
    notes: ""
