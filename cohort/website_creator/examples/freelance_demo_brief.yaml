  - slug: faq
    title: "FAQ"
    template: faq
    nav_label: ""
    in_nav: false
    meta_description: "Answers to common roofing questions from Denver's Apex Roofing. Insurance claims, cost, timeline, and more."
    content:
      headline: "Roofing Questions, Answered"
      subheadline: "Everything you need to know before, during, and after your roofing project."
      faqs:
        - question: "How much does a new roof cost?"
          answer: "Most residential roofs in the Denver metro range from $8,500 to $18,000 depending on size, pitch, and materials. We provide free, itemized estimates with no hidden fees."
        - question: "Will my insurance cover storm damage?"
          answer: "In most cases, yes. Colorado homeowner policies typically cover hail and wind damage. Our insurance specialist Amanda handles the entire claims process — from filing to adjuster meetings to final payment."
        - question: "How long does a roof replacement take?"
          answer: "Most residential roofs are completed in 1-2 days. We remove all old materials, inspect the decking, and install your new roof. You can stay in your home during the work."
        - question: "Do you offer financing?"
          answer: "Yes. We partner with GreenSky for 0% interest financing options on qualifying projects. We also work with your insurance company's payment schedule."
        - question: "What warranty do you offer?"
          answer: "Every Apex installation comes with a lifetime workmanship warranty. Our GAF Master Elite status also qualifies homeowners for GAF's Golden Pledge warranty — the strongest in the industry."
        - question: "How do I know if my roof needs replacing?"
          answer: "Common signs include missing or curling shingles, granules in your gutters, daylight visible in the attic, and your roof being 20+ years old. We offer free inspections — no obligation, just honest answers."
        - question: "What brands do you install?"
          answer: "We're certified installers for GAF, CertainTeed, and Owens Corning. We recommend the best option based on your budget, aesthetic preference, and warranty goals."
        - question: "Are your crews employees or subcontractors?"
          answer: "All Apex crews are full-time employees — not subcontractors. They're background-checked, drug-tested, and trained to our standards. You'll see the same faces from start to finish."
      cta_heading: "Still Have Questions?"
      cta_subheading: "We're happy to help. Give us a call or fill out our contact form."
      cta_text: "Contact Us"
      cta_href: "contact.html"
