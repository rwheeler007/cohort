  - slug: about
    title: "About Apex Roofing"
    template: team
    meta_description: "Family-owned Denver roofing company since 2011. GAF-certified, BBB A+ rated, and locally operated."
    content:
      headline: "Built on Handshakes, Not Hard Sells"
      subheadline: "Family-owned. Locally operated. Here to stay."
      story_heading: "Our Story"
      story: >-
        Apex Roofing started in 2011 when founder Mike Reeves got tired of watching storm chasers
        take advantage of his neighbors after a bad hailstorm. He grabbed a ladder, a truck, and a
        commitment to do things right. Fourteen years later, we've replaced over 3,000 roofs across
        the Denver metro area. We're GAF Master Elite certified (top 2% of roofers nationwide), BBB
        A+ rated, and every one of our installers is a full-time Apex employee — not a subcontractor.
        We live here. Our kids go to school here. When we put our name on your roof, it means something.
      core_values:
        - title: "Honesty First"
          description: "We'll tell you if your roof doesn't need replacing. We'd rather earn your trust than a quick sale."
        - title: "Local Commitment"
          description: "We've been in Denver since 2011. We sponsor Little League teams, not billboard campaigns."
        - title: "Workmanship Guarantee"
          description: "Lifetime warranty on every install. If something goes wrong, we fix it. Period."
      team_members:
