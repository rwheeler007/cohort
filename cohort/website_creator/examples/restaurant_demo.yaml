# Restaurant Demo -- Bella Trattoria
# Tests: nav, hero_banner, menu_display, reservation_cta, specials_showcase, photo_gallery, chef_about, footer

site:
  name: "Bella Trattoria"
  tagline: "Authentic Italian in the Heart of the City"
  description: "Family-owned Italian restaurant serving handmade pasta and wood-fired pizza since 1985."

skin:
  palette_id: burgundy
  font_pairing_id: editorial
  border_radius: 4px

pages:

  - slug: index
    title: "Bella Trattoria - Authentic Italian Restaurant"
    meta_description: "Family-owned Italian restaurant. Handmade pasta, wood-fired pizza, and an award-winning wine list."
    blocks:

      - type: nav
        variant: nav_clean
        product_name: "Bella Trattoria"
        logo: ""
        nav_items:
          - label: Home
            href: index.html
          - label: Menu
            href: menu.html
          - label: About
            href: about.html
          - label: Contact
            href: contact.html
        cta_text: "Reserve a Table"
        cta_href: "#reservation"

      - type: hero_banner
        variant: hero_image_bg
        headline: "A Taste of Italy, Made with Love"
        subheadline: "Handmade pasta, wood-fired pizza, and an award-winning wine list. Family-owned since 1985."
        cta_primary_text: "Reserve a Table"
        cta_primary_href: "#reservation"
        cta_secondary_text: "View Our Menu"
        cta_secondary_href: "menu.html"
        hero_image: "https://placehold.co/1400x600/991B1B/FFFFFF?text=Bella+Trattoria"

      - type: specials_showcase
        variant: specials_hero_cards
        heading: "Tonight's Specials"
        specials:
          - name: "Osso Buco"
            description: "Braised veal shank with saffron risotto and gremolata"
            price: "$34"
            image: "https://placehold.co/400x300/991B1B/fff?text=Osso+Buco"
          - name: "Burrata Caprese"
            description: "Creamy burrata with heirloom tomatoes, basil oil, and aged balsamic"
            price: "$18"
            image: "https://placehold.co/400x300/991B1B/fff?text=Burrata"
          - name: "Limoncello Tiramisu"
            description: "Our signature dessert with a citrus twist"
            price: "$14"
            image: "https://placehold.co/400x300/991B1B/fff?text=Tiramisu"

      - type: menu_display
        variant: menu_classic
        section_headline: "Our Menu"
        categories:
          - name: "Antipasti"
            items:
              - name: "Bruschetta al Pomodoro"
                description: "Grilled bread topped with fresh tomatoes, garlic, basil, and extra virgin olive oil"
                price: "$12"
                dietary_tags: [V]
              - name: "Carpaccio di Manzo"
                description: "Thinly sliced raw beef with arugula, capers, and shaved Parmigiano"
                price: "$16"
                dietary_tags: [GF]
              - name: "Calamari Fritti"
                description: "Lightly fried squid with marinara and lemon aioli"
                price: "$14"
                dietary_tags: []
          - name: "Pasta"
            items:
              - name: "Cacio e Pepe"
                description: "Handmade tonnarelli with Pecorino Romano and black pepper"
                price: "$22"
                dietary_tags: [V]
              - name: "Bolognese"
                description: "Slow-cooked meat ragu over fresh pappardelle"
                price: "$24"
                dietary_tags: []
              - name: "Linguine alle Vongole"
                description: "Littleneck clams, white wine, garlic, and parsley"
                price: "$26"
                dietary_tags: []
          - name: "Pizza"
            items:
              - name: "Margherita"
                description: "San Marzano tomatoes, fresh mozzarella, basil"
                price: "$18"
                dietary_tags: [V]
              - name: "Diavola"
                description: "Spicy sopressata, Calabrian chili, mozzarella"
                price: "$20"
                dietary_tags: []

      - type: reservation_cta
        variant: reservation_prominent
        heading: "Reserve Your Table"
        booking_url: "#"
        phone: "(212) 555-8901"
        hours:
          - day: "Monday - Thursday"
            time: "5:00 PM - 10:00 PM"
          - day: "Friday - Saturday"
            time: "5:00 PM - 11:00 PM"
          - day: "Sunday"
            time: "4:00 PM - 9:00 PM"

      - type: footer
        variant: footer_4col
        product_name: "Bella Trattoria"
        tagline: "Authentic Italian in the Heart of the City"
        footer_columns:
          - heading: "Visit Us"
            links:
              - label: "456 Mulberry Street"
                href: "#"
              - label: "New York, NY 10013"
                href: "#"
          - heading: "Hours"
            links:
              - label: "Mon-Thu: 5-10 PM"
                href: "#"
              - label: "Fri-Sat: 5-11 PM"
                href: "#"
              - label: "Sun: 4-9 PM"
                href: "#"
          - heading: "Contact"
            links:
              - label: "(212) 555-8901"
                href: "tel:+12125558901"
              - label: "info@bellatrattoria.com"
                href: "mailto:info@bellatrattoria.com"
        social_links:
          - platform: instagram
            url: "#"
        copyright_text: "Bella Trattoria. All rights reserved."

