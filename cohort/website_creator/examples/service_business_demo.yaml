# Service Business Demo -- Joe's Plumbing
# Tests: nav, hero_banner, services_grid, testimonials, cta_strip, process_steps, contact_form, footer

site:
  name: "Joe's Plumbing"
  tagline: "Your Trusted Local Plumber Since 1998"
  description: "Licensed residential and commercial plumbing services in Portland, OR."

skin:
  palette_id: forest
  font_pairing_id: clean
  border_radius: 8px

pages:

  - slug: index
    title: "Joe's Plumbing - Portland's Trusted Plumber"
    meta_description: "Licensed residential and commercial plumbing in Portland, OR. 24/7 emergency service."
    blocks:

      - type: nav
        variant: nav_clean
        product_name: "Joe's Plumbing"
        logo: ""
        nav_items:
          - label: Home
            href: index.html
          - label: Services
            href: services.html
          - label: About
            href: about.html
          - label: Contact
            href: contact.html
        cta_text: "Call Now"
        cta_href: "tel:+15035551234"

      - type: hero_banner
        variant: hero_centered
        headline: "Portland's Most Trusted Plumber"
        subheadline: "Licensed, insured, and ready 24/7. From leaky faucets to full remodels, we've got you covered."
        cta_primary_text: "Get a Free Estimate"
        cta_primary_href: "contact.html"
        cta_secondary_text: "Our Services"
        cta_secondary_href: "services.html"

      - type: services_grid
        variant: services_cards
        section_headline: "Our Services"
        services:
          - name: "Emergency Repairs"
            description: "Burst pipes, gas leaks, and sewer backups handled within the hour. Available 24/7."
            icon: ""
            cta_text: "Learn More"
            cta_href: "services.html"
          - name: "Kitchen & Bath Remodels"
            description: "Complete plumbing rough-in and finish work for your dream kitchen or bathroom."
            icon: ""
            cta_text: "Learn More"
            cta_href: "services.html"
          - name: "Water Heater Service"
            description: "Tank and tankless installation, repair, and annual maintenance plans."
            icon: ""
            cta_text: "Learn More"
            cta_href: "services.html"

      - type: process_steps
        variant: steps_numbered_circles
        heading: "How It Works"
        steps:
          - number: 1
            title: "Call or Book Online"
            description: "Reach us 24/7 by phone or fill out our quick online form."
          - number: 2
            title: "Free Estimate"
            description: "We assess the job and give you a transparent, no-surprise quote."
          - number: 3
            title: "Expert Service"
            description: "Our licensed plumbers complete the work to code, guaranteed."

      - type: testimonials
        variant: testimonials_cards
        section_headline: "What Our Customers Say"
        testimonials:
          - quote: "Joe's team fixed our burst pipe at 2am. Professional, fast, and fair pricing."
            name: "Sarah M."
            title: "Homeowner"
          - quote: "Best plumbing service in Portland. They remodeled our entire bathroom on time and on budget."
            name: "David K."
            title: "Homeowner"
          - quote: "We use Joe's for all our commercial properties. Reliable and always available."
            name: "Linda R."
            title: "Property Manager"

      - type: cta_strip
        variant: cta_colored_bg
        heading: "Ready to Fix That Leak?"
        subheading: "Call us now or book online for a free, no-obligation estimate."
        cta_text: "Get Your Free Estimate"
        cta_href: "contact.html"

      - type: footer
        variant: footer_4col
        product_name: "Joe's Plumbing"
        tagline: "Your Trusted Local Plumber Since 1998"
        footer_columns:
          - heading: Services
            links:
              - label: Emergency Repairs
                href: "services.html"
              - label: Remodels
                href: "services.html"
              - label: Water Heaters
                href: "services.html"
          - heading: Company
            links:
              - label: About Us
                href: "about.html"
              - label: Testimonials
                href: "index.html#testimonials"
          - heading: Contact
            links:
              - label: "(503) 555-1234"
                href: "tel:+15035551234"
              - label: "joe@joesplumbing.com"
                href: "mailto:joe@joesplumbing.com"
        social_links: []
        copyright_text: "Joe's Plumbing LLC. All rights reserved."

  - slug: contact
    title: "Contact Joe's Plumbing"
    meta_description: "Get a free plumbing estimate. Call, email, or fill out our contact form."
    blocks:

      - type: nav
        variant: nav_clean
        product_name: "Joe's Plumbing"
        logo: ""
        nav_items:
          - label: Home
            href: index.html
          - label: Services
            href: services.html
          - label: About
            href: about.html
          - label: Contact
            href: contact.html
        cta_text: "Call Now"
        cta_href: "tel:+15035551234"

      - type: hero_banner
        variant: hero_minimal
        headline: "Get in Touch"
        subheadline: "We'd love to hear from you. Fill out the form below or give us a call."

      - type: contact_form
        variant: contact_split
        section_headline: "Contact Us"
        form_fields:
          - name: name
            label: "Your Name"
            type: text
            required: true
          - name: email
            label: "Email Address"
            type: email
            required: true
          - name: phone
            label: "Phone Number"
            type: tel
            required: false
          - name: message
            label: "How can we help?"
            type: textarea
            required: true
        email: "joe@joesplumbing.com"
        phone: "(503) 555-1234"
        address: "1234 SE Hawthorne Blvd, Portland, OR 97214"

      - type: footer
        variant: footer_minimal
        product_name: "Joe's Plumbing"
        tagline: "Your Trusted Local Plumber Since 1998"
        social_links: []
        copyright_text: "Joe's Plumbing LLC. All rights reserved."
