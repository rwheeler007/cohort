      steps_heading: "How It Works"
      cta_heading: "Ready to Orchestrate?"
      cta_subheading: "Open source. Self-hosted. Start in 5 minutes."

  - slug: "features"
    title: "How It Works"
    template: "features"
    nav_label: "How It Works"
    in_nav: true
    meta_description: "Learn how Cohort's multi-agent orchestration works -- compiled roundtables, contribution scoring, and parallel work queues."
    content:
      headline: "Under the Hood"
      subheadline: "Cohort's architecture is designed for one thing: getting multiple AI agents to produce better results than any single agent could alone."
