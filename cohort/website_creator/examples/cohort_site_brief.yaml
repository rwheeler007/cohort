  - slug: "use-cases"
    title: "Use Cases"
    template: "content"
    nav_label: "Use Cases"
    in_nav: true
    meta_description: "Real-world use cases for Cohort multi-agent orchestration -- website generation, code review, content pipelines, security audits."
    content:
      subheadline: "What teams are building with Cohort today."
      sections:
        - heading: "Website Generation"
          body: "Input your current site + competitors, answer 20 questions, and Cohort's agents build you a complete, responsive, SEO-optimized website in minutes. This site is proof."
        - heading: "Code Review & Security Audit"
          body: "Point Cohort at a codebase and get multi-perspective analysis: security vulnerabilities, code quality issues, performance bottlenecks, and documentation gaps -- all in parallel."
        - heading: "Content Pipeline"
          body: "From RSS intelligence gathering to blog post drafting, social media adaptation, and newsletter formatting -- Cohort's content agents produce publish-ready bundles."
        - heading: "Executive Briefings"
          body: "Automated daily reports with agent activity narratives, tech intel summaries, and task execution metrics. Know exactly what your AI team accomplished."
        - heading: "Agent Training"
          body: "Overnight training pipelines that research topics, curate materials, inject knowledge, and assess agent performance -- all while you sleep."

  - slug: "pricing"
    title: "Pricing"
    template: "solution"
    nav_label: "Pricing"
    in_nav: true
    meta_description: "Cohort pricing -- free open source, Pro for teams, Enterprise for scale."
    content:
      headline: "Simple, Transparent Pricing"
      subheadline: "Start free. Scale when you're ready."
      pricing_heading: "Choose Your Plan"
      cta_heading: "Questions?"
      cta_text: "Contact Us"
      cta_href: "contact.html"

  - slug: "docs"
    title: "Documentation"
    template: "content"
    nav_label: "Docs"
    in_nav: true
    meta_description: "Cohort documentation -- installation, quickstart, API reference, and agent development guide."
    content:
      subheadline: "Everything you need to get started with Cohort."
      sections:
        - heading: "Quick Start"
          body: "Install Cohort and run your first multi-agent task in under 5 minutes."
          list_items:
            - "pip install cohort"
            - "cohort init my-project"
            - "cohort serve --port 5100"
            - "Open http://localhost:5100 in your browser"
        - heading: "Core Concepts"
          body: "Understand the building blocks: agents, sessions, roundtables, work queues, and briefings."
        - heading: "API Reference"
          body: "Full REST API documentation for the Cohort server. All endpoints, request/response schemas, and WebSocket events."
        - heading: "Agent Development"
          body: "Create custom agents with agent_config.json, agent_persona.md, and agent_prompt.md. No base class required -- just implement the protocol."

  - slug: "contact"
