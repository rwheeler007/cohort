      - "99.9% uptime SLA"
      - "Dedicated support engineer"
      - "On-premise deployment"
      - "Custom integrations"
    cta_text: "Contact Sales"
    cta_href: "contact.html"
    highlighted: false

# --- Testimonials ---
testimonials:
  - quote: "We pointed Cohort at our codebase and got a security audit, documentation update, and three bug fixes -- all before lunch."
