# SaaS Product Demo -- TaskFlow
# Tests: nav, hero_banner, brand_trust_bar, features_grid, pricing_tiers, testimonials, cta_strip, faq_accordion, footer

site:
  name: "TaskFlow"
  tagline: "Project Management That Gets Out of Your Way"
  description: "Lightweight project management for teams of 5-50. No training needed."

skin:
  palette_id: violet
  font_pairing_id: modern
  border_radius: 12px

pages:

  - slug: index
    title: "TaskFlow - Project Management That Gets Out of Your Way"
    meta_description: "Lightweight project management for small teams. Start free, no credit card required."
    blocks:

      - type: nav
        variant: nav_bold
        product_name: "TaskFlow"
        logo: ""
        nav_items:
          - label: Features
            href: features.html
          - label: Pricing
            href: pricing.html
          - label: Contact
            href: contact.html
        cta_text: "Start Free"
        cta_href: "#"

      - type: hero_banner
        variant: hero_split
        headline: "Ship Projects, Not Spreadsheets"
        subheadline: "TaskFlow replaces your messy spreadsheets with a clean board your whole team actually uses. Free for up to 10 users."
        cta_primary_text: "Start Free Trial"
        cta_primary_href: "#"
        cta_secondary_text: "Watch Demo"
        cta_secondary_href: "#"
        hero_image: "https://placehold.co/600x400/7C3AED/FFFFFF?text=TaskFlow+Board"

      - type: brand_trust_bar
        variant: trust_grayscale_row
        heading: "Trusted by teams at"
        logos:
          - name: "Acme Corp"
            src: "https://placehold.co/120x40/666/fff?text=Acme"
          - name: "Bolt"
            src: "https://placehold.co/120x40/666/fff?text=Bolt"
          - name: "Nova"
            src: "https://placehold.co/120x40/666/fff?text=Nova"
          - name: "Pixel"
            src: "https://placehold.co/120x40/666/fff?text=Pixel"
          - name: "Drift"
            src: "https://placehold.co/120x40/666/fff?text=Drift"

      - type: features_grid
        variant: features_3col_cards
        section_headline: "Everything You Need, Nothing You Don't"
        features:
          - title: "Board View"
            description: "Drag-and-drop cards across columns. Customizable workflows for any team."
            icon: ""
          - title: "Timeline"
            description: "See deadlines at a glance. Automatic dependency tracking keeps everyone aligned."
            icon: ""
          - title: "Team Chat"
            description: "Comment on tasks, tag teammates, share files -- all in context."
            icon: ""
          - title: "Automations"
            description: "Auto-assign, auto-notify, auto-close. Set rules once, never think about them again."
            icon: ""
          - title: "Integrations"
            description: "Connect Slack, GitHub, Figma, and 50+ tools your team already uses."
            icon: ""
          - title: "Reports"
            description: "Burndown charts, velocity tracking, and custom dashboards in two clicks."
            icon: ""

      - type: testimonials
        variant: testimonials_large_quote
        section_headline: "What Teams Say"
        testimonials:
          - quote: "We switched from Jira to TaskFlow and our sprint velocity went up 30%. The team actually enjoys planning now."
            name: "Alex Chen"
            title: "Engineering Lead"
            company: "Bolt"

      - type: cta_strip
        variant: cta_colored_bg
        heading: "Ready to Simplify Your Workflow?"
        subheading: "Free for teams up to 10. No credit card required."
        cta_text: "Start Free Trial"
        cta_href: "#"

      - type: footer
        variant: footer_minimal
        product_name: "TaskFlow"
        tagline: "Project Management That Gets Out of Your Way"
        social_links:
          - platform: twitter
            url: "#"
          - platform: github
            url: "#"
        copyright_text: "TaskFlow Inc. All rights reserved."

  - slug: pricing
    title: "TaskFlow Pricing"
    meta_description: "Simple, transparent pricing. Free for small teams."
    blocks:

      - type: nav
        variant: nav_bold
        product_name: "TaskFlow"
        logo: ""
        nav_items:
          - label: Features
            href: features.html
          - label: Pricing
            href: pricing.html
          - label: Contact
            href: contact.html
        cta_text: "Start Free"
        cta_href: "#"

      - type: hero_banner
        variant: hero_centered
        headline: "Simple Pricing, No Surprises"
        subheadline: "Start free. Upgrade when you're ready."

      - type: pricing_tiers
        variant: pricing_highlighted
        section_headline: ""
        tiers:
          - name: "Free"
            price: "$0"
            period: "/month"
            description: "For small teams getting started"
            features:
              - "Up to 10 users"
              - "Unlimited boards"
              - "Basic integrations"
              - "Community support"
            cta_text: "Get Started"
            cta_href: "#"
            highlighted: false
          - name: "Pro"
            price: "$12"
            period: "/user/month"
            description: "For growing teams that need more"
            features:
              - "Unlimited users"
              - "Advanced automations"
              - "All integrations"
              - "Priority support"
              - "Custom workflows"
              - "Analytics dashboard"
            cta_text: "Start Free Trial"
            cta_href: "#"
            highlighted: true
            badge: "Most Popular"
          - name: "Enterprise"
            price: "Custom"
            period: ""
            description: "For large organizations"
            features:
              - "Everything in Pro"
              - "SSO / SAML"
              - "Audit logs"
              - "Dedicated account manager"
              - "99.9% SLA"
              - "Custom onboarding"
            cta_text: "Contact Sales"
            cta_href: "contact.html"
            highlighted: false

      - type: faq_accordion
        variant: faq_simple
        section_headline: "Frequently Asked Questions"
        faqs:
          - question: "Can I switch plans later?"
            answer: "Yes, you can upgrade or downgrade at any time. Changes take effect on your next billing cycle."
          - question: "Is there a free trial for Pro?"
            answer: "Yes! Every Pro plan starts with a 14-day free trial. No credit card required."
          - question: "What payment methods do you accept?"
            answer: "We accept all major credit cards, PayPal, and wire transfer for Enterprise plans."

      - type: footer
        variant: footer_minimal
        product_name: "TaskFlow"
        tagline: "Project Management That Gets Out of Your Way"
        social_links: []
        copyright_text: "TaskFlow Inc. All rights reserved."
