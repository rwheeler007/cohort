# Website Creator -- Decision Engine Specification
# =================================================
# Neural flowchart-based decision system.
# Tier 1 (1B model): atomic yes/no/idk classification at temp 0
# Tier 2 (9B model): creative generation at adaptive temperature
#
# All branching logic lives in Python. Models are classifiers, not reasoners.
# Taste profiles accumulate from three sources:
#   1. User choices (A/B/C comparisons)
#   2. Competitor site analysis (scraped + classified)
#   3. Scraped user site analysis (if they have an existing site)


# ---------------------------------------------------------------------
# TIER DEFINITIONS
# ---------------------------------------------------------------------

tiers:
  tier_1:
    model: "llama3.2:1b"
    temperature: 0.0
    num_predict: 5
    top_k: 1
    purpose: "Atomic classification -- yes/no/idk only"
    vram: "~1GB"
    latency: "<100ms per question"
    parallelizable: true
    output_format:
      type: enum
      values: ["yes", "no", "idk"]

  tier_2:
    model: "qwen3.5:9b"
    temperature: adaptive  # from taste_profile.creativity
    purpose: "Creative generation -- headlines, copy, nuanced decisions"
    vram: "~6.6GB"
    latency: "2-8s per generation"
    parallelizable: false  # sequential due to VRAM
    output_format:
      type: yaml_block  # structured YAML matching Pydantic schemas


# ---------------------------------------------------------------------
# ESCALATION RULES
# ---------------------------------------------------------------------

escalation:
  idk_handling:
    # When tier 1 returns "idk":
    - attempt: rephrase
      description: "Rephrase the question with more context and retry tier 1"
      max_retries: 1
    - attempt: escalate
      description: "Send to tier 2 for nuanced classification"
    - attempt: conservative_default
      description: "Fall back to category default (documented per question)"

  confidence_threshold:
    # If tier 1 returns the same answer <threshold times across similar questions,
    # the profile dimension is uncertain and we ask the user instead
    min_consistent_signals: 2
    action: "Present as user_choice instead of ai_decision"


# ---------------------------------------------------------------------
# COMPETITOR SITE ANALYSIS (Neural Flowchart)
# ---------------------------------------------------------------------
# Run against scraped competitor HTML to build a competitor taste profile.
# Same dimensions as user taste profile -- enables direct comparison.

competitor_analysis:
  description: |
    Scrape 1-2 competitor sites, extract HTML/CSS, then classify along
    taste profile dimensions using tier 1 questions. The competitor
    profiles inform variant selection and user prompts.

  # Structural questions (from scraped HTML)
  structure_questions:
    - id: comp_has_hero
      question: "Does this website have a large hero section at the top of the homepage?"
      dimension: null  # structural, not taste
      output: has_hero_section

    - id: comp_has_pricing
      question: "Does this website display pricing information?"
      dimension: null
      output: has_pricing

    - id: comp_has_testimonials
      question: "Does this website show customer reviews or testimonials?"
      dimension: null
      output: has_testimonials

    - id: comp_has_booking
      question: "Does this website have a booking, scheduling, or reservation feature?"
      dimension: null
      output: has_booking

    - id: comp_has_blog
      question: "Does this website have a blog or articles section?"
      dimension: null
      output: has_blog

    - id: comp_has_faq
      question: "Does this website have a FAQ or frequently asked questions section?"
      dimension: null
      output: has_faq

    - id: comp_has_gallery
      question: "Does this website have a photo gallery or image showcase?"
      dimension: null
      output: has_gallery

    - id: comp_has_menu
      question: "Does this website display a food or drink menu with items and prices?"
      dimension: null
      output: has_menu

    - id: comp_has_team
      question: "Does this website show team member profiles or an about-the-team section?"
      dimension: null
      output: has_team

    - id: comp_has_contact_form
      question: "Does this website have a contact form?"
      dimension: null
      output: has_contact_form

  # Taste questions (from scraped HTML + CSS)
  taste_questions:
    - id: comp_formal
      question: "Does this website feel formal and corporate rather than casual and friendly?"
      dimension: formality
      signal_weight: 0.3

    - id: comp_dense
      question: "Does this website have a lot of content on each page with minimal whitespace?"
      dimension: density
      signal_weight: 0.3

    - id: comp_warm_colors
      question: "Does this website primarily use warm colors like reds, oranges, browns, or earth tones?"
      dimension: warmth
      signal_weight: 0.3

    - id: comp_warm_imagery
      question: "Does this website use natural photography of people, food, or nature rather than illustrations or abstract graphics?"
      dimension: warmth
      signal_weight: 0.2

    - id: comp_creative_layout
      question: "Does this website use an unusual or asymmetric layout rather than a standard grid?"
      dimension: creativity
      signal_weight: 0.3

    - id: comp_creative_typography
      question: "Does this website use decorative or display fonts rather than standard sans-serif body text?"
      dimension: creativity
      signal_weight: 0.2

    - id: comp_bold_colors
      question: "Does this website use high-contrast, saturated colors rather than muted or pastel tones?"
      dimension: boldness
      signal_weight: 0.3

    - id: comp_bold_cta
      question: "Does this website have large, prominent call-to-action buttons that stand out from the page?"
      dimension: boldness
      signal_weight: 0.2

  # Derived competitor intelligence (Python logic, no LLM)
  derived_insights:
    - id: comp_block_inventory
      description: "Map of which blocks each competitor uses"
      source: structure_questions
      logic: |
        blocks_present = {q.output: answer for q in structure_questions if answer == "yes"}

    - id: comp_taste_profile
      description: "Taste profile for each competitor (same 5 dimensions as user)"
      source: taste_questions
      logic: |
        for q in taste_questions:
          if answer == "yes":
            profile[q.dimension] += q.signal_weight
          elif answer == "no":
            profile[q.dimension] -= q.signal_weight * 0.5

    - id: industry_norm
      description: "Average taste profile across all competitors"
      source: comp_taste_profile
      logic: |
        industry_norm = mean(competitor_profiles)

    - id: differentiation_gaps
      description: "Blocks competitors are missing (opportunity for user)"
      source: comp_block_inventory
      logic: |
        for block in category.available_blocks:
          if no competitor has block:
            gaps.append(block)

    - id: crowded_patterns
      description: "Blocks/variants all competitors use (sameness risk)"
      source: comp_block_inventory
      logic: |
        for block in category.available_blocks:
          if all competitors have block:
            crowded.append(block)


# ---------------------------------------------------------------------
# USER SITE ANALYSIS (Neural Flowchart)
# ---------------------------------------------------------------------
# If the user has an existing site, classify it the same way.
# This establishes their CURRENT position vs where they want to go.

user_site_analysis:
  description: |
    Same questions as competitor analysis, applied to user's existing site.
    Produces a "current state" taste profile and block inventory.
    The decision engine uses the delta between current and desired
    to prioritize what changes matter most.

  questions: competitor_analysis.structure_questions + competitor_analysis.taste_questions

  derived_insights:
    - id: user_current_profile
      description: "Where the user's site currently sits on taste dimensions"

    - id: user_current_blocks
      description: "What blocks the user's current site has"

    - id: upgrade_delta
      description: "Difference between current site and generated site"
      logic: |
        for dimension in taste_profile:
          delta[dimension] = desired[dimension] - current[dimension]
        # Large positive deltas = biggest perceived improvements
        # Highlight these in the preview: "Your new site is more X than before"

    - id: missing_blocks
      description: "Blocks the user should have but currently doesn't"
      logic: |
        for block in category.required_blocks:
          if block not in user_current_blocks:
            missing.append(block)
        # These become selling points: "You're missing testimonials --
        # your competitors all have them"


# ---------------------------------------------------------------------
# PHASE 1: CATEGORY CLASSIFICATION (Neural Flowchart)
# ---------------------------------------------------------------------

phase_1_classification:
  description: |
    Classify the business into a category using tier 1 questions.
    Input: business_description (from user) + scraped site HTML (if available)
    Output: category_id

  questions:
    - id: is_food_drink
      tier: 1
      question: "Is this business primarily a restaurant, cafe, bar, bakery, or food service?"
      input: business_description
      routes:
        yes: restaurant
        no: continue
        idk: continue

    - id: is_software
      tier: 1
      question: "Does this business sell software, an app, a digital tool, or an online platform?"
      input: business_description
      routes:
        yes: saas_product
        no: continue
        idk: continue

    - id: is_service
      tier: 1
      question: "Does this business sell professional services, expertise, or skilled labor?"
      input: business_description
      routes:
        yes: service_business
        no: escalate
        idk: escalate

    - id: fallback_escalation
      tier: 2
      question: "Given this business description, which category fits best: service_business, saas_product, or restaurant?"
      input: business_description
      output_format: category_id
      note: "Only fires if tier 1 can't classify (unusual business types)"

    - id: final_fallback
      type: user_choice
      prompt: "We're not sure which category fits best. Which describes you?"
      note: "Only fires if tier 2 also returns idk"


# ---------------------------------------------------------------------
# PHASE 2: TASTE PROFILING (Neural Flowchart + User Choices)
# ---------------------------------------------------------------------

phase_2_taste_profiling:
  description: |
    Build the taste profile from three sources:
    1. Competitor analysis (automatic, tier 1)
    2. User site analysis (automatic if they have a site, tier 1)
    3. User A/B choices (interactive, tier 1 classifies the options)

  # Step 1: Classify competitors (automatic, runs in background)
  competitor_classification:
    trigger: "After phase 1 completes and scraping finishes"
    questions: competitor_analysis.structure_questions + competitor_analysis.taste_questions
    parallelizable: true
    total_tier_1_calls: 18  # 10 structure + 8 taste per competitor
    # 2 competitors = 36 calls, ~3-4 seconds total at 100ms each

  # Step 2: Classify user's existing site (automatic if URL provided)
  user_site_classification:
    trigger: "If user provides their current website URL"
    questions: user_site_analysis.questions
    parallelizable: true
    total_tier_1_calls: 18

  # Step 3: User visual comparisons (interactive)
  # The options shown are INFORMED by competitor/user analysis
  user_comparisons:

    - id: vibe_comparison
      type: user_choice
      display: side_by_side_preview
      options_count: 3
      option_generation:
        description: |
          Generate 3 mini-preview options that span the taste space.
          Use competitor industry_norm as center point.
          Option A: slightly more formal/conventional than industry norm
          Option B: at industry norm
          Option C: slightly more creative/bold than industry norm
        tier: 2  # needs creative generation for the previews
      post_choice_classification:
        # After user picks, classify what their choice signals
        tier: 1
        questions:
          - "Is the chosen option more formal than the rejected options?"    # -> formality
          - "Is the chosen option more colorful than the rejected options?"  # -> boldness
          - "Is the chosen option more spacious than the rejected options?"  # -> density (inverse)
          - "Is the chosen option warmer than the rejected options?"         # -> warmth

    - id: color_comparison
      type: user_choice
      display: palette_swatches
      options_count: 3
      option_generation:
        description: |
          Filter skin.palettes by warmth alignment with current taste_profile.
          If competitor profiles cluster around cool palettes, include
          one warm palette as a differentiation option.
        tier: deterministic  # pure Python filtering, no LLM needed
      post_choice_classification:
        tier: 1
        questions:
          - "Is this color palette warm-toned?"     # -> warmth
          - "Is this color palette high-contrast?"  # -> boldness

    - id: font_comparison
      type: user_choice
      display: font_preview
      options_count: 3
      option_generation:
        description: |
          Filter skin.font_pairings by formality alignment.
          Show one pair that matches competitors, one that's different.
        tier: deterministic
      post_choice_classification:
        tier: 1
        questions:
          - "Does this font pairing feel formal/professional?"  # -> formality
          - "Is this font pairing conventional or decorative?"  # -> creativity

    - id: layout_comparison
      type: user_choice
      display: wireframe_preview
      options_count: 2
      option_generation:
        description: |
          Show 2 homepage block arrangements for their category.
          One matches most common competitor layout. One differs.
        tier: deterministic
      post_choice_classification:
        tier: 1
        questions:
          - "Is this layout content-dense?"   # -> density
          - "Is this layout conventional?"     # -> creativity (inverse)


# ---------------------------------------------------------------------
# PHASE 3: BLOCK SELECTION & VARIANT MATCHING (Neural Flowchart)
# ---------------------------------------------------------------------

phase_3_block_selection:
  description: |
    Use accumulated taste profile + competitor intelligence to select
    which optional blocks to include and which variant to use for each.
    All tier 1 except content generation.

  # Step 1: Optional block inclusion (tier 1)
  block_inclusion:
    description: "For each optional block in the category, should we include it?"
    questions_per_block:
      # Context-aware: includes competitor data and taste profile
      - template: "This {category} business described as '{description}' -- would adding a {block_name} section improve the site?"
        tier: 1
      - template: "{n_competitors} of {total_competitors} competitor sites have a {block_name} section. Should this site include one?"
        tier: 1
        note: "Differentiation signal -- if 0 competitors have it, it's an opportunity. If all have it, it's expected."
    decision_logic: |
      if both questions == "yes": include block
      if first == "yes" and second == "no": include (differentiation opportunity)
      if first == "no": exclude
      if any == "idk": include if category.default says so, exclude otherwise

  # Step 2: Variant selection (tier 1)
  variant_selection:
    description: "For each included block, which design variant fits the taste profile?"
    method: |
      1. Filter variants by tag match against taste profile
         (e.g., formality > 0.6 prefers variants tagged 'formal')
      2. If multiple pass filter, use tier 1 to pick:
    question_template: "Given a {taste_description} aesthetic, is variant '{variant_id}' ({variant_description}) a good fit?"
    tier: 1
    fallback: "First variant that passes filter (deterministic)"

  # Step 3: Block ordering (deterministic)
  block_ordering:
    description: "Determine final block order on each page"
    method: |
      if constraint_tightness > 0.7:
        use category.page_assemblies order exactly
      else:
        use category.page_assemblies as base, allow tier 2 to suggest reordering
    note: "Most users get strict ordering. Only highly creative profiles get flexibility."

  # Step 4: Content generation (tier 2)
  content_generation:
    description: "Generate text content for each block"
    tier: 2
    temperature: "taste_profile.creativity * 0.4 + 0.15"
    inputs:
      - business_name
      - business_description
      - primary_action
      - taste_profile
      - competitor_intelligence
      - category
    outputs:
      - hero_headline
      - hero_subheadline
      - cta_primary_text
      - cta_secondary_text
      - section_headings  # per included block
      - meta_description
      - page_titles


# ---------------------------------------------------------------------
# PHASE 4: COMPETITIVE INTELLIGENCE PROMPTS
# ---------------------------------------------------------------------
# User-facing insights derived from competitor analysis.
# Shown during Phase 2 choices and Phase 4 preview.

competitive_prompts:
  # Presented as context during user choices
  during_choices:
    - trigger: "color_comparison"
      condition: "all competitors use cool palettes"
      prompt: "Your competitors all use cool, corporate blues. A warmer palette would help you stand out."

    - trigger: "layout_comparison"
      condition: "no competitors have testimonials"
      prompt: "None of your competitors show customer reviews. Adding testimonials could be a differentiator."

    - trigger: "layout_comparison"
      condition: "all competitors have same hero style"
      prompt: "Every competitor uses a centered hero banner. A split layout would catch the eye."

  # Presented in the preview/approval phase
  during_preview:
    - condition: "user site missing blocks that competitors have"
      prompt: "Your current site is missing {missing_blocks} that your competitors all have."

    - condition: "user site taste differs significantly from generated"
      prompt: "Your new site shifts from {current_tone} to {new_tone} -- a {delta_description} upgrade."

    - condition: "generated site has blocks no competitor has"
      prompt: "Your new {unique_blocks} sections set you apart from competitors in your space."


# ---------------------------------------------------------------------
# CALL BUDGET
# ---------------------------------------------------------------------
# Expected tier 1 and tier 2 calls per site generation.

call_budget:
  phase_1_classification:
    tier_1: 3       # category questions
    tier_2: 0-1     # only if escalation needed

  phase_2_competitor_analysis:
    tier_1: 36      # 18 questions x 2 competitors (parallelizable)
    tier_2: 0

  phase_2_user_site_analysis:
    tier_1: 0-18    # only if user has existing site (parallelizable)
    tier_2: 0

  phase_2_user_choices:
    tier_1: 8-12    # post-choice classification questions
    tier_2: 1       # vibe preview generation

  phase_3_block_selection:
    tier_1: 10-20   # 2 questions per optional block + variant selection
    tier_2: 0

  phase_3_content_generation:
    tier_1: 0
    tier_2: 3-5     # headline, copy, meta, section headings

  totals:
    tier_1: 57-89   # all parallelizable within phase, ~6-9 seconds total
    tier_2: 4-7     # sequential, ~15-40 seconds total
    total_time: "~30-60 seconds for full pipeline"
    cost: "free (local inference)"
