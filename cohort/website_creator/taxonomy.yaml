# Website Creator -- Adaptive Taxonomy & Decision Engine
# =====================================================
# This is NOT a static config. It's a decision tree specification.
# Each node is either a USER choice or an AI decision.
# User choices feed a taste profile that adapts AI parameters downstream.
#
# Architecture:
#   Decision Tree -> Taste Profile -> Adaptive Parameters -> Block Assembly
#
# The system gets smarter about the user with each interaction.
# Early choices are broad (category, vibe). Later choices are refined
# (specific variants, content tone) using accumulated signals.


# ---------------------------------------------------------------------
# DECISION ENGINE
# ---------------------------------------------------------------------
# Decisions are made in phases. Each phase narrows the solution space.
# Within each phase, decisions can be:
#   - user_choice: presented as A/B or A/B/C options with visual previews
#   - ai_decision: made by the roundtable, informed by taste_profile
#   - derived: calculated from previous decisions (no interaction needed)

decision_phases:

  # Phase 1: Category & Identity (user-driven, broad strokes)
  phase_1_identity:
    description: "Establish what the business IS and what it needs"
    decisions:

      - id: site_category
        type: user_choice
        prompt: "Which best describes your business?"
        options_from: categories
        display: card_select  # show 3 cards with icon + description
        signals:
          # What this choice tells us about downstream decisions
          - sets: category
          - sets: default_page_set
          - sets: available_blocks
          - biases: tone_direction

      - id: business_name
        type: user_input
        prompt: "What's your business name?"
        signals:
          - sets: product_name
          - feeds: headline_generation

      - id: business_description
        type: user_input
        prompt: "Describe what you do in one sentence."
        signals:
          - feeds: roundtable_context
          - feeds: seo_generation

      - id: primary_action
        type: user_choice
        prompt: "What's the #1 thing you want visitors to do?"
        options:
          - id: call
            label: "Call or message me"
            signals: "cta_style: direct, include_booking: true"
          - id: book
            label: "Book an appointment / reservation"
            signals: "cta_style: booking, include_booking: true"
          - id: buy
            label: "Buy or sign up"
            signals: "cta_style: conversion, include_pricing: true"
          - id: learn
            label: "Learn more and explore"
            signals: "cta_style: soft, content_depth: high"
          - id: order
            label: "Place an order"
            signals: "cta_style: order, include_order_online: true"

  # Phase 2: Aesthetic Direction (user-driven, A/B/C visual choices)
  # Each choice updates the taste_profile which adapts AI parameters
  phase_2_aesthetics:
    description: "Discover the user's visual preferences through comparison"
    adaptation: true  # later choices in this phase adapt based on earlier ones
    decisions:

      - id: vibe_check
        type: user_choice
        prompt: "Which of these feels more like your brand?"
        display: side_by_side_preview  # render 2-3 mini previews
        options_count: 3  # show 3 options
        options_source: ai_generated  # roundtable generates 3 contrasting vibes
        signals:
          - updates: taste_profile.formality    # formal <-> casual
          - updates: taste_profile.density      # spacious <-> dense
          - updates: taste_profile.warmth       # cool <-> warm
          - updates: taste_profile.creativity   # conventional <-> artistic

      - id: color_direction
        type: user_choice
        prompt: "Which color palette speaks to you?"
        display: palette_swatches
        options_count: 3
        options_source: filtered_palettes  # filtered by taste_profile.warmth
        signals:
          - sets: skin.palette_id
          - updates: taste_profile.boldness

      - id: typography_direction
        type: user_choice
        prompt: "Which text style fits your brand?"
        display: font_preview  # render same headline in each pairing
        options_count: 3
        options_source: filtered_fonts  # filtered by taste_profile.formality
        signals:
          - sets: skin.font_pairing_id
          - updates: taste_profile.creativity

      - id: layout_preference
        type: user_choice
        prompt: "Which layout feels right for your homepage?"
        display: wireframe_preview  # simplified block layout diagrams
        options_count: 2
        options_source: category_layouts  # from page_assemblies for their category
        signals:
          - sets: home_layout_variant
          - updates: taste_profile.density

  # Phase 3: AI-Driven Refinement (roundtable decides, informed by taste_profile)
  # Temperature and constraint levels adapt based on accumulated signals
  phase_3_refinement:
    description: "AI makes detailed decisions using taste profile as guidance"
    decisions:

      - id: block_selection
        type: ai_decision
        description: "Select which optional blocks to include"
        input: [category, taste_profile, primary_action]
        output: included_blocks[]
        # AI decides based on category defaults + taste signals

      - id: block_variants
        type: ai_decision
        description: "Select design variant for each included block"
        input: [included_blocks, taste_profile]
        output: block_variant_map  # {block_id: variant_id}
        # Creative users get more unusual variants
        # Conservative users get proven layouts

      - id: content_generation
        type: ai_decision
        description: "Generate headlines, descriptions, CTAs"
        input: [business_name, business_description, taste_profile, primary_action]
        output: content_map  # {headline, subheadline, cta_text, section_headings}
        temperature_source: taste_profile.creativity
        # Artistic taste -> higher temp, more creative copy
        # Professional taste -> lower temp, conventional copy

      - id: hero_image_direction
        type: ai_decision
        description: "Determine hero image style and source"
        input: [category, taste_profile, scraped_images]
        output: image_guidance  # style keywords for image selection/generation

  # Phase 4: User Approval (final review before render)
  phase_4_approval:
    description: "Show assembled preview, let user adjust"
    decisions:

      - id: preview_approval
        type: user_choice
        prompt: "Here's your site preview. What would you like to adjust?"
        display: full_preview
        options:
          - id: approve
            label: "Looks great, generate it"
          - id: adjust_colors
            label: "Try different colors"
            returns_to: phase_2_aesthetics.color_direction
          - id: adjust_layout
            label: "Try a different layout"
            returns_to: phase_2_aesthetics.layout_preference
          - id: adjust_content
            label: "Change the text/headlines"
            returns_to: phase_3_refinement.content_generation
          - id: start_over
            label: "Start fresh"
            returns_to: phase_1_identity


# ---------------------------------------------------------------------
# TASTE PROFILE
# ---------------------------------------------------------------------
# Accumulated from user choices. Each dimension is a float from 0.0 to 1.0.
# Updated incrementally -- early choices set rough position, later choices refine.

taste_profile:
  dimensions:
    formality:
      range: [0.0, 1.0]      # 0.0 = casual/playful, 1.0 = formal/corporate
      default: 0.5
      affects:
        - font_pairing_filter
        - content_tone
        - spacing_scale

    density:
      range: [0.0, 1.0]      # 0.0 = spacious/minimal, 1.0 = content-rich/dense
      default: 0.5
      affects:
        - blocks_per_page
        - section_padding
        - content_length

    warmth:
      range: [0.0, 1.0]      # 0.0 = cool/techy, 1.0 = warm/organic
      default: 0.5
      affects:
        - palette_filter
        - border_radius       # warm = more rounded
        - image_style          # warm = natural photos, cool = illustrations/gradients

    creativity:
      range: [0.0, 1.0]      # 0.0 = conventional/safe, 1.0 = artistic/experimental
      default: 0.3            # default conservative -- earned through choices
      affects:
        - ai_temperature       # maps directly to LLM temperature for content generation
        - variant_pool         # creative = include unusual block variants
        - layout_asymmetry     # creative = allow non-standard layouts
        - font_pool            # creative = include display/decorative fonts

    boldness:
      range: [0.0, 1.0]      # 0.0 = subtle/muted, 1.0 = high-contrast/dramatic
      default: 0.5
      affects:
        - color_saturation
        - font_weight
        - cta_prominence


# ---------------------------------------------------------------------
# PARAMETER ADAPTATION
# ---------------------------------------------------------------------
# How taste_profile dimensions map to concrete AI and rendering parameters.

parameter_mapping:

  ai_temperature:
    description: "LLM temperature for content generation and roundtable decisions"
    formula: "base_temp + (taste_profile.creativity * 0.4)"
    # creativity 0.0 -> temp 0.15 (safe, predictable)
    # creativity 0.5 -> temp 0.35 (balanced)
    # creativity 1.0 -> temp 0.55 (experimental)
    base: 0.15
    max: 0.55

  variant_pool_size:
    description: "How many block variants the AI can choose from"
    formula: "min_variants + (taste_profile.creativity * extra_variants)"
    # creativity 0.0 -> only top 2 most conventional variants
    # creativity 1.0 -> all available variants including experimental
    min_variants: 2
    extra_variants: 4

  constraint_tightness:
    description: "How strictly the roundtable must follow the prescribed block order"
    formula: "1.0 - (taste_profile.creativity * 0.5)"
    # creativity 0.0 -> 1.0 (strict, follow category assembly exactly)
    # creativity 1.0 -> 0.5 (loose, AI can reorder/swap blocks)

  content_temperature:
    description: "Temperature specifically for headline/copy generation"
    formula: "0.10 + (taste_profile.creativity * 0.5) + (taste_profile.boldness * 0.1)"
    # Conservative professional -> 0.10 (safe copy)
    # Creative bold -> 0.70 (punchy, unexpected copy)

  border_radius:
    description: "Global border radius in px"
    formula: "taste_profile.warmth * 16"
    # warmth 0.0 -> 0px (sharp, techy)
    # warmth 0.5 -> 8px (balanced)
    # warmth 1.0 -> 16px (soft, friendly)


# ---------------------------------------------------------------------
# BLOCK LIBRARY
# ---------------------------------------------------------------------
