# ---------------------------------------------------------------------
# CATEGORIES
# ---------------------------------------------------------------------
# Each category defines default pages and block assemblies.
# These are DEFAULTS -- the decision engine can modify them
# based on taste_profile.creativity and constraint_tightness.

categories:

  service_business:
    label: "Service Business"
    description: "I sell my expertise, time, or professional services"
    icon: briefcase
    examples: [plumber, electrician, lawyer, accountant, consultant, contractor, car wash, salon, gym, cleaning service, landscaper, dentist, veterinarian]

    default_pages: [home, services, about, contact]

    page_assemblies:
      home:
        required: [nav, hero_banner, services_grid, testimonials, cta_strip, footer]
        optional: [top_info_strip, process_steps, stats_banner, credentials_strip, before_after_gallery]
        max_blocks: 10
      services:
        required: [nav, hero_banner, services_grid, cta_strip, footer]
        optional: [before_after_gallery, credentials_strip, process_steps]
        max_blocks: 8
      about:
        required: [nav, hero_banner, content_sections, footer]
        optional: [credentials_strip, testimonials, stats_banner]
        max_blocks: 7
      contact:
        required: [nav, hero_banner, contact_form, footer]
        optional: [booking_widget, faq_accordion, top_info_strip]
        max_blocks: 7

    skin_bias:
      formality: 0.7
      warmth: 0.4
      creativity: 0.2
      boldness: 0.4

  saas_product:
    label: "Software / Digital Product"
    description: "I sell software, an app, or a digital platform"
    icon: code
    examples: [SaaS platform, mobile app, developer tool, analytics dashboard, automation tool, API service, browser extension, desktop software]

    default_pages: [home, features, pricing, contact]

    page_assemblies:
      home:
        required: [nav, hero_banner, features_grid, cta_strip, footer]
        optional: [brand_trust_bar, alternating_feature_image, testimonials, stats_banner, pricing_tiers, product_demo]
        max_blocks: 11
      features:
        required: [nav, hero_banner, features_grid, cta_strip, footer]
        optional: [alternating_feature_image, product_demo, integration_logos]
        max_blocks: 8
      pricing:
        required: [nav, hero_banner, pricing_tiers, cta_strip, footer]
        optional: [faq_accordion, testimonials]
        max_blocks: 7
      contact:
        required: [nav, hero_banner, contact_form, footer]
        optional: [faq_accordion]
        max_blocks: 6

    optional_pages:
      problem_solution:
        required: [nav, hero_banner, problem_statement, solution_overview, cta_strip, footer]
        optional: [testimonials]
        max_blocks: 7
      blog:
        required: [nav, hero_banner, blog_previews, footer]
        optional: [newsletter_signup]
        max_blocks: 5

    skin_bias:
      formality: 0.5
      warmth: 0.3
      creativity: 0.4
      boldness: 0.5

  restaurant:
    label: "Restaurant / Food & Drink"
    description: "I serve food, drinks, or hospitality experiences"
    icon: utensils
    examples: [restaurant, cafe, bar, bakery, food truck, catering company, brewery, wine bar, pizza shop, juice bar]

    default_pages: [home, menu, about, contact]

    page_assemblies:
      home:
        required: [nav, hero_banner, menu_display, reservation_cta, footer]
        optional: [top_info_strip, specials_showcase, photo_gallery, testimonials]
        max_blocks: 9
      menu:
        required: [nav, hero_banner, menu_display, footer]
        optional: [specials_showcase, order_online_cta]
        max_blocks: 6
      about:
        required: [nav, hero_banner, content_sections, footer]
        optional: [chef_about, photo_gallery]
        max_blocks: 6
      contact:
        required: [nav, hero_banner, contact_form, footer]
        optional: [top_info_strip, location_map, reservation_cta]
        max_blocks: 7

    skin_bias:
      formality: 0.6
      warmth: 0.8
      creativity: 0.3
      boldness: 0.4


# ---------------------------------------------------------------------
# TASTE PROFILE
# ---------------------------------------------------------------------
# Accumulated from user choices. 0.0 to 1.0 per dimension.

taste_profile:
  dimensions:

    formality:
      range: [0.0, 1.0]
      description: "0 = casual/playful, 1 = formal/corporate"
      default_from: category.skin_bias.formality
      affects: [font_filter, content_tone, spacing_scale, variant_tag_filter]

    density:
      range: [0.0, 1.0]
      description: "0 = spacious/minimal, 1 = content-rich/dense"
      default: 0.5
      affects: [blocks_per_page, section_padding, content_length, variant_tag_filter]

    warmth:
      range: [0.0, 1.0]
      description: "0 = cool/techy, 1 = warm/organic"
      default_from: category.skin_bias.warmth
      affects: [palette_filter, border_radius, image_style, variant_tag_filter]

    creativity:
      range: [0.0, 1.0]
      description: "0 = conventional/safe, 1 = artistic/experimental"
      default_from: category.skin_bias.creativity
      affects: [ai_temperature, variant_pool_size, layout_flexibility, font_pool_size]

    boldness:
      range: [0.0, 1.0]
      description: "0 = subtle/muted, 1 = high-contrast/dramatic"
      default_from: category.skin_bias.boldness
      affects: [color_saturation, font_weight, cta_prominence, variant_tag_filter]


# ---------------------------------------------------------------------
# PARAMETER ADAPTATION
# ---------------------------------------------------------------------

parameter_mapping:

  ai_temperature:
    description: "LLM temperature for content generation"
    formula: "0.15 + (creativity * 0.4)"
    range: [0.15, 0.55]

  variant_pool_size:
    description: "How many variants per block the AI can choose from"
    formula: "2 + round(creativity * 4)"
    range: [2, 6]

  constraint_tightness:
    description: "How strictly block order must follow category assembly"
    formula: "1.0 - (creativity * 0.5)"
    range: [0.5, 1.0]

  content_temperature:
    description: "Temperature for headline/copy generation"
    formula: "0.10 + (creativity * 0.5) + (boldness * 0.1)"
    range: [0.10, 0.70]

  border_radius:
    description: "Global border radius in px"
    formula: "round(warmth * 16)"
    range: [0, 16]


