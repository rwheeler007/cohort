name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint, type-check, and test across the Python version matrix
  # ---------------------------------------------------------------------------
  ci:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: pip install -e '.[dev]'

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy cohort/ || true

      - name: Run tests with coverage
        run: pytest --cov || true

  # ---------------------------------------------------------------------------
  # PyPI publish runs on the PUBLIC repo (rwheeler007/cohort) only.
  # Tags are synced there by sync-public.yml which triggers the publish job.
  # ---------------------------------------------------------------------------
