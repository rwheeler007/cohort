<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B2D31"/>
      <stop offset="100%" stop-color="#1a1c1f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D97757" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D97757" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Network nodes (agent collaboration visualization) -->
  <!-- Connection lines -->
  <g stroke="#D97757" stroke-opacity="0.25" stroke-width="1.5">
    <line x1="180" y1="180" x2="350" y2="280"/>
    <line x1="350" y1="280" x2="550" y2="200"/>
    <line x1="550" y1="200" x2="750" y2="300"/>
    <line x1="750" y1="300" x2="900" y2="200"/>
    <line x1="900" y1="200" x2="1050" y2="300"/>
    <line x1="350" y1="280" x2="450" y2="420"/>
    <line x1="550" y1="200" x2="650" y2="380"/>
    <line x1="750" y1="300" x2="650" y2="380"/>
    <line x1="900" y1="200" x2="1000" y2="400"/>
    <line x1="180" y1="180" x2="250" y2="400"/>
    <line x1="250" y1="400" x2="450" y2="420"/>
    <line x1="650" y1="380" x2="850" y2="450"/>
    <line x1="1000" y1="400" x2="850" y2="450"/>
    <line x1="1050" y1="300" x2="1000" y2="400"/>
  </g>

  <!-- Nodes -->
  <g>
    <circle cx="180" cy="180" r="8" fill="#D97757" opacity="0.9"/>
    <circle cx="180" cy="180" r="16" fill="none" stroke="#D97757" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="350" cy="280" r="10" fill="#D97757" opacity="0.8"/>
    <circle cx="350" cy="280" r="20" fill="none" stroke="#D97757" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="550" cy="200" r="12" fill="#D97757" opacity="0.9"/>
    <circle cx="550" cy="200" r="24" fill="none" stroke="#D97757" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="750" cy="300" r="10" fill="#D97757" opacity="0.7"/>
    <circle cx="750" cy="300" r="20" fill="none" stroke="#D97757" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="900" cy="200" r="9" fill="#D97757" opacity="0.8"/>
    <circle cx="900" cy="200" r="18" fill="none" stroke="#D97757" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="1050" cy="300" r="7" fill="#D97757" opacity="0.6"/>
    <circle cx="1050" cy="300" r="14" fill="none" stroke="#D97757" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="250" cy="400" r="6" fill="#D97757" opacity="0.5"/>
    <circle cx="450" cy="420" r="9" fill="#D97757" opacity="0.7"/>
    <circle cx="450" cy="420" r="18" fill="none" stroke="#D97757" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="650" cy="380" r="11" fill="#D97757" opacity="0.8"/>
    <circle cx="650" cy="380" r="22" fill="none" stroke="#D97757" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="850" cy="450" r="8" fill="#D97757" opacity="0.6"/>
    <circle cx="850" cy="450" r="16" fill="none" stroke="#D97757" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="1000" cy="400" r="7" fill="#D97757" opacity="0.5"/>
  </g>

  <!-- Glow behind text -->
  <ellipse cx="600" cy="290" rx="350" ry="120" fill="url(#glow)"/>

  <!-- COHORT text -->
  <text x="600" y="280" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="72" fill="#ffffff" letter-spacing="12">COHORT</text>

  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" letter-spacing="2">AI Team Coordination</text>

  <!-- Subtitle -->
  <text x="600" y="375" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="rgba(255,255,255,0.45)">Your agents, thinking together.</text>

  <!-- Bottom accent bar -->
  <rect x="520" y="410" width="160" height="3" rx="1.5" fill="#D97757" opacity="0.6"/>

  <!-- Corner badge -->
  <rect x="0" y="0" width="200" height="40" fill="#D97757" opacity="0.9"/>
  <text x="100" y="26" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="14" fill="#1a1c1f">OPEN SOURCE</text>
</svg>
