<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <!-- Subtle shadow filter -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <!-- Glow for primary elements -->
    <filter id="glow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#D97757" flood-opacity="0.4"/>
    </filter>
    <!-- Subtle glow for connectors -->
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#D97757" flood-opacity="0.3"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#D97757">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <!-- Gradient for background depth -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#33363B"/>
      <stop offset="100%" stop-color="#2B2D31"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern for texture -->
  <g opacity="0.03">
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="800" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="800" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="800" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- ===== TITLE ===== -->
  <text x="600" y="52" text-anchor="middle" fill="#D97757" font-size="28" font-weight="700" letter-spacing="3">COHORT</text>
  <text x="600" y="76" text-anchor="middle" fill="#8A8D93" font-size="13" font-weight="400" letter-spacing="5">MULTI-AGENT ORCHESTRATION</text>

  <!-- ===== AGENT BOXES (top row) ===== -->
  <!-- Architect -->
  <g filter="url(#shadow)">
    <rect x="115" y="110" width="190" height="62" rx="8" fill="#C46A4E" opacity="0.95"/>
    <rect x="115" y="110" width="190" height="62" rx="8" fill="none" stroke="#E08868" stroke-width="1" opacity="0.5"/>
    <text x="210" y="147" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="600">Architect</text>
  </g>

  <!-- Developer -->
  <g filter="url(#shadow)">
    <rect x="355" y="110" width="190" height="62" rx="8" fill="#D97757" opacity="0.95"/>
    <rect x="355" y="110" width="190" height="62" rx="8" fill="none" stroke="#E89A80" stroke-width="1" opacity="0.5"/>
    <text x="450" y="147" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="600">Developer</text>
  </g>

  <!-- Tester -->
  <g filter="url(#shadow)">
    <rect x="595" y="110" width="190" height="62" rx="8" fill="#B85F45" opacity="0.95"/>
    <rect x="595" y="110" width="190" height="62" rx="8" fill="none" stroke="#D4806A" stroke-width="1" opacity="0.5"/>
    <text x="690" y="147" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="600">Tester</text>
  </g>

  <!-- Researcher -->
  <g filter="url(#shadow)">
    <rect x="835" y="110" width="190" height="62" rx="8" fill="#A8553D" opacity="0.95"/>
    <rect x="835" y="110" width="190" height="62" rx="8" fill="none" stroke="#C87A64" stroke-width="1" opacity="0.5"/>
    <text x="930" y="147" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="600">Researcher</text>
  </g>

  <!-- Agent label -->
  <text x="82" y="145" text-anchor="end" fill="#8A8D93" font-size="11" font-weight="400" letter-spacing="2" transform="rotate(-90 82 145)">AGENTS</text>

  <!-- ===== ARROWS: Agents -> Orchestrator ===== -->
  <g filter="url(#lineGlow)">
    <line x1="210" y1="172" x2="520" y2="268" stroke="#D97757" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.7"/>
    <line x1="450" y1="172" x2="555" y2="268" stroke="#D97757" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.8"/>
    <line x1="690" y1="172" x2="635" y2="268" stroke="#D97757" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.8"/>
    <line x1="930" y1="172" x2="670" y2="268" stroke="#D97757" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.7"/>
  </g>

  <!-- ===== ORCHESTRATOR (central hub) ===== -->
  <g filter="url(#glow)">
    <rect x="430" y="270" width="340" height="78" rx="10" fill="#D97757"/>
    <rect x="430" y="270" width="340" height="78" rx="10" fill="none" stroke="#F5E6DE" stroke-width="1.5" opacity="0.4"/>
    <text x="600" y="302" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="700">Orchestrator</text>
    <text x="600" y="325" text-anchor="middle" fill="#F5E6DE" font-size="12" font-weight="400" opacity="0.8">Central Hub  |  Routing + Coordination</text>
  </g>

  <!-- ===== ARROWS: Orchestrator -> Meeting Engine & ChatManager ===== -->
  <g filter="url(#lineGlow)">
    <!-- Left branch to Meeting Engine -->
    <path d="M 520 348 L 520 370 Q 520 385 505 385 L 350 385 Q 335 385 335 400 L 335 420" stroke="#D97757" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <!-- Right branch to ChatManager -->
    <path d="M 680 348 L 680 370 Q 680 385 695 385 L 820 385 Q 835 385 835 400 L 835 420" stroke="#D97757" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>

  <!-- ===== MEETING ENGINE (left) ===== -->
  <g filter="url(#shadow)">
    <rect x="185" y="422" width="300" height="72" rx="8" fill="#3A3D42"/>
    <rect x="185" y="422" width="300" height="72" rx="8" fill="none" stroke="#D97757" stroke-width="1.5" opacity="0.6"/>
    <text x="335" y="455" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="600">Meeting Engine</text>
    <text x="335" y="475" text-anchor="middle" fill="#8A8D93" font-size="11" font-weight="400">Scoring + Gating</text>
  </g>

  <!-- ===== CHATMANAGER (right) ===== -->
  <g filter="url(#shadow)">
    <rect x="685" y="422" width="300" height="72" rx="8" fill="#3A3D42"/>
    <rect x="685" y="422" width="300" height="72" rx="8" fill="none" stroke="#D97757" stroke-width="1.5" opacity="0.6"/>
    <text x="835" y="455" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="600">ChatManager</text>
    <text x="835" y="475" text-anchor="middle" fill="#8A8D93" font-size="11" font-weight="400">Messages + Channels</text>
  </g>

  <!-- ===== 5-DIMENSION SCORING CALLOUT (from Meeting Engine) ===== -->
  <!-- Connector line -->
  <g filter="url(#lineGlow)">
    <path d="M 280 494 L 280 530 Q 280 540 280 540" stroke="#D97757" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.6"/>
  </g>

  <!-- Callout box -->
  <g filter="url(#shadow)">
    <rect x="100" y="540" width="360" height="195" rx="8" fill="#33363B"/>
    <rect x="100" y="540" width="360" height="195" rx="8" fill="none" stroke="#D97757" stroke-width="1" opacity="0.35"/>

    <!-- Header -->
    <text x="280" y="570" text-anchor="middle" fill="#D97757" font-size="14" font-weight="700" letter-spacing="1">5-DIMENSION SCORING</text>
    <line x1="140" y1="582" x2="420" y2="582" stroke="#D97757" stroke-width="0.5" opacity="0.3"/>

    <!-- Dimension items with indicators -->
    <!-- Novelty -->
    <circle cx="140" cy="608" r="4" fill="#D97757" opacity="0.9"/>
    <text x="158" y="613" fill="#FFFFFF" font-size="14" font-weight="500">Novelty</text>
    <text x="158" y="628" fill="#8A8D93" font-size="10">Fresh perspective value</text>

    <!-- Expertise -->
    <circle cx="310" cy="608" r="4" fill="#C46A4E" opacity="0.9"/>
    <text x="328" y="613" fill="#FFFFFF" font-size="14" font-weight="500">Expertise</text>
    <text x="328" y="628" fill="#8A8D93" font-size="10">Domain relevance</text>

    <!-- Ownership -->
    <circle cx="140" cy="656" r="4" fill="#B85F45" opacity="0.9"/>
    <text x="158" y="661" fill="#FFFFFF" font-size="14" font-weight="500">Ownership</text>
    <text x="158" y="676" fill="#8A8D93" font-size="10">Responsibility stake</text>

    <!-- Phase -->
    <circle cx="310" cy="656" r="4" fill="#A8553D" opacity="0.9"/>
    <text x="328" y="661" fill="#FFFFFF" font-size="14" font-weight="500">Phase</text>
    <text x="328" y="676" fill="#8A8D93" font-size="10">Meeting stage fit</text>

    <!-- History -->
    <circle cx="220" cy="704" r="4" fill="#E08868" opacity="0.9"/>
    <text x="238" y="709" fill="#FFFFFF" font-size="14" font-weight="500">History</text>
    <text x="238" y="724" fill="#8A8D93" font-size="10">Prior contribution weight</text>
  </g>

  <!-- ===== ARROW: ChatManager -> StorageBackend ===== -->
  <g filter="url(#lineGlow)">
    <line x1="835" y1="494" x2="835" y2="568" stroke="#D97757" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <!-- ===== STORAGE BACKEND (below ChatManager) ===== -->
  <g filter="url(#shadow)">
    <rect x="670" y="570" width="330" height="78" rx="8" fill="#3A3D42"/>
    <rect x="670" y="570" width="330" height="78" rx="8" fill="none" stroke="#F5E6DE" stroke-width="1" opacity="0.3"/>
    <!-- Protocol badge -->
    <rect x="690" y="582" width="72" height="20" rx="4" fill="#D97757" opacity="0.25"/>
    <text x="726" y="596" text-anchor="middle" fill="#D97757" font-size="10" font-weight="600" letter-spacing="1">PROTOCOL</text>
    <text x="835" y="610" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="600">StorageBackend</text>
    <text x="835" y="630" text-anchor="middle" fill="#8A8D93" font-size="11" font-weight="400">Bring Your Own  |  JSON, SQLite, S3...</text>
  </g>

  <!-- ===== DECORATIVE: flow direction indicator ===== -->
  <text x="1130" y="400" text-anchor="end" fill="#8A8D93" font-size="10" font-weight="400" letter-spacing="2" opacity="0.4">DATA FLOW</text>
  <line x1="1085" y1="120" x2="1085" y2="380" stroke="#8A8D93" stroke-width="1" opacity="0.15" marker-end="url(#arrowhead)"/>

  <!-- ===== FOOTER ===== -->
  <text x="600" y="775" text-anchor="middle" fill="#8A8D93" font-size="11" font-weight="400" letter-spacing="2" opacity="0.5">cohort  -  pip install cohort-ai</text>
</svg>