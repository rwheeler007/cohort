<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap');
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2B2D31"/>
      <stop offset="100%" stop-color="#232529"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#E8956F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-line)"/>

  <!-- Subtle grid dots for texture -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#FFFFFF" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left accent glow -->
  <ellipse cx="100" cy="315" rx="300" ry="400" fill="#D97757" opacity="0.03"/>

  <!-- COHORT title -->
  <text x="100" y="185" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="96" font-weight="900" fill="#FFFFFF" letter-spacing="8">COHORT</text>

  <!-- Accent underline -->
  <rect x="100" y="205" width="120" height="4" rx="2" fill="#D97757"/>

  <!-- Tagline -->
  <text x="100" y="265" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#F5E6DE" letter-spacing="0.5">Multi-Agent Orchestration That Ships</text>

  <!-- Three callout cards -->
  <!-- Card 1: Zero Dependencies -->
  <rect x="100" y="320" width="300" height="100" rx="10" fill="#FFFFFF" opacity="0.05"/>
  <rect x="100" y="320" width="300" height="3" rx="1.5" fill="#D97757"/>
  <text x="250" y="365" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">ZERO DEPENDENCIES</text>
  <text x="250" y="395" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#F5E6DE" text-anchor="middle" opacity="0.7">Pure Python. No bloat.</text>

  <!-- Card 2: Local-First Inference -->
  <rect x="440" y="320" width="300" height="100" rx="10" fill="#FFFFFF" opacity="0.05"/>
  <rect x="440" y="320" width="300" height="3" rx="1.5" fill="#D97757"/>
  <text x="590" y="365" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">LOCAL-FIRST INFERENCE</text>
  <text x="590" y="395" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#F5E6DE" text-anchor="middle" opacity="0.7">Your GPU. Your data.</text>

  <!-- Card 3: Contribution Scoring -->
  <rect x="780" y="320" width="300" height="100" rx="10" fill="#FFFFFF" opacity="0.05"/>
  <rect x="780" y="320" width="300" height="3" rx="1.5" fill="#D97757"/>
  <text x="930" y="365" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">CONTRIBUTION SCORING</text>
  <text x="930" y="395" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#F5E6DE" text-anchor="middle" opacity="0.7">Measure what matters.</text>

  <!-- Terminal command box -->
  <rect x="100" y="480" width="440" height="52" rx="8" fill="#1A1B1E" stroke="#3fb950" stroke-width="1.5" opacity="0.9"/>
  <text x="126" y="512" font-family="'JetBrains Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13" fill="#888" font-weight="500">$</text>
  <text x="148" y="512" font-family="'JetBrains Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="20" fill="#3fb950" font-weight="700">pip install cohort</text>

  <!-- Bottom right info -->
  <text x="1100" y="555" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#D97757" text-anchor="end">cohort.dev</text>
  <text x="1100" y="582" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#F5E6DE" text-anchor="end" opacity="0.6">Open Source / Apache 2.0</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent-line)"/>
</svg>
