services:
  # HTTP message bus -- shared state for multi-agent conversations
  cohort-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_EXTRAS: server
    command: ["python", "-m", "cohort", "serve", "--host", "0.0.0.0", "--port", "5000"]
    ports:
      - "5000:5000"
    volumes:
      - cohort-data:/home/cohort/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Full stack: server + MCP + Claude integration
  cohort-full:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_EXTRAS: server,mcp
    command: ["python", "-m", "cohort", "serve", "--host", "0.0.0.0", "--port", "5000"]
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - cohort-data:/home/cohort/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cohort-data:
